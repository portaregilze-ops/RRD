<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRD</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
  }
  video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  header {
    position: fixed;
    top: 16px;
    right: 24px;
    z-index: 10;
  }
  header img {
    height: 40px;
    width: auto;
  }
</style>
</head>
<body>

<video autoplay loop muted playsinline>
  <source src="video.mp4" type="video/mp4">
</video>

<header>
  <img src="logo.png" alt="Logo">
</header>

</body>
</html>
