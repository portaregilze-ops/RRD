<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>video.mp4</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0e0e10;
    color: #f5f5f5;
    min-height: 100vh;
  }
  header {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 16px 24px;
  }
  header img {
    height: 40px;
    width: auto;
  }
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }
  .video-wrapper {
    width: 100%;
    max-width: 960px;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
  }
  video {
    width: 100%;
    height: auto;
    display: block;
  }
  h1 {
    margin-top: 24px;
    font-size: 1.4rem;
    font-weight: 600;
  }
</style>
</head>
<body>

<header>
  <img src="PortareBenelux_Logo_Diap vierkant.png" alt="Logo">
</header>

<main>
  <div class="video-wrapper">
    <video controls preload="metadata">
      <source src="video.mp4" type="video/mp4">
      Je browser ondersteunt geen video-tag.
    </video>
  </div>
  <h1>Mijn Video</h1>
</main>

</body>
</html>
