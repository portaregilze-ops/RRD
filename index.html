<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RRD</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; }
  header {
    position: fixed;
    top: 0; right: 0;
    padding: 16px 24px;
    z-index: 10;
  }
  header img { height: 40px; }
  video {
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>
<header>
  <img src="logo.png" alt="Logo">
</header>
<video autoplay loop muted playsinline>
  <source src="video.mp4" type="video/mp4">
</video>
</body>
</html>
